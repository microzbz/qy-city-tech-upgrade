spring:
  application:
    name: city-tech-upgrade
  datasource:
    url: "${MYSQL_JDBC_URL:jdbc:mysql://172.17.0.1:3306/city_upgrade?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}"
    username: "${MYSQL_JDBC_USERNAME:qiyuan}"
    password: "${MYSQL_JDBC_PASSWORD:qiyuan}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 40MB

server:
  port: 8654

app:
  init:
    demo-data-enabled: "${APP_INIT_DEMO_DATA_ENABLED:true}"
  jwt:
    secret: city-tech-upgrade-secret-key-change-me-2026
    expire-seconds: 7200
  file-storage:
    base-path: uploads
    preview-base-path: ""
    sub-dir-pattern: yyyy/M/d
  external:
    qf:
      enabled: true
      base-url: "https://try.dg.gov.cn/dgecsp/webapi/api/"
      policy-name: "新型技改城市平台"
      policy-pwd: srhkbybw
      enterprise-api-name: enterprisePortrait
      sso-api-name: getUserInfoByToken
      system-msg-enabled: "${APP_QF_SYSTEM_MSG_ENABLED:true}"
      system-msg-api-name: sendSystemMsg
      system-msg-biz-type: "${APP_QF_SYSTEM_MSG_BIZ_TYPE:}"
      system-msg-dept-code: "${APP_QF_SYSTEM_MSG_DEPT_CODE:}"
      system-msg-dept-name: "${APP_QF_SYSTEM_MSG_DEPT_NAME:}"
      system-msg-link: "${APP_QF_SYSTEM_MSG_LINK:}"
    msg-center:
      enabled: true
      base-url: "${APP_MSG_CENTER_BASE_URL:http://zwfw.dg.gov.cn/api/}"
      policy-name: "${APP_MSG_CENTER_POLICY_NAME:新型技改城市平台}"
      policy-pwd: "${APP_MSG_CENTER_POLICY_PWD:zsetyxvp}"
      send-api-name: msgCentreSend
      send-result-api-name: msgCentreSendResult
      template-id: "${APP_MSG_CENTER_TEMPLATE_ID:7dd9a614-834a-4974-a798-a5b880e8a931}"
      receive-param-type: "2"
      ext-data-type: city-tech-upgrade-approval
      query-result-enabled: true
