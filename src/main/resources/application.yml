spring:
  application:
    name: city-tech-upgrade
  datasource:
    url: "${DM_JDBC_URL:jdbc:dm://localhost:5236}"
    username: "${DM_JDBC_USERNAME:SYSDBA}"
    password: "${DM_JDBC_PASSWORD:SysdbA123}"
    driver-class-name: dm.jdbc.driver.DmDriver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.DmDialect
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        default_schema: CITY_UPGRADE
        format_sql: false
        boot:
          allow_jdbc_metadata_access: false
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 40MB

server:
  port: 8654

app:
  init:
    demo-data-enabled: "${APP_INIT_DEMO_DATA_ENABLED:true}"
  jwt:
    secret: city-tech-upgrade-secret-key-change-me-2026
    expire-seconds: 7200
  file-storage:
    base-path: uploads
    preview-base-path: ""
    sub-dir-pattern: yyyy/M/d
  external:
    qf:
      enabled: true
      base-url: "https://try.dg.gov.cn/dgecsp/webapi/api/"
      policy-name: "新型技改城市平台"
      policy-pwd: srhkbybw
      enterprise-api-name: enterprisePortrait
      sso-api-name: getUserInfoByToken
    msg-center:
      enabled: true
      base-url: "${APP_MSG_CENTER_BASE_URL:http://zwfw.dg.gov.cn/api/}"
      policy-name: "${APP_MSG_CENTER_POLICY_NAME:新型技改城市平台}"
      policy-pwd: "${APP_MSG_CENTER_POLICY_PWD:zsetyxvp}"
      send-api-name: msgCentreSend
      send-result-api-name: msgCentreSendResult
      template-id: "${APP_MSG_CENTER_TEMPLATE_ID:c0bc0e91-0582-4749-a93b-4463c0be7f74}"
      receive-param-type: "2"
      ext-data-type: city-tech-upgrade-approval
      query-result-enabled: true
