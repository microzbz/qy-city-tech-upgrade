spring:
  application:
    name: city-tech-upgrade
  datasource:
    url: "jdbc:mysql://localhost:3306/city_tech_upgrade?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai"
    username: qiyuan
    password: qiyuan
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.MySQLDialect
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
  sql:
